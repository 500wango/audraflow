name: Linux Release

on:
  workflow_dispatch:
    inputs:
      publish_release:
        description: "Upload the Linux artifacts to a GitHub Release"
        required: false
        default: false
        type: boolean
      release_tag:
        description: "Release tag to create/update when publishing manually; defaults to package.json version, for example v1.0.0"
        required: false
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-linux:
    name: Build Linux packages
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20.19.5"
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            curl \
            ffmpeg \
            file \
            libayatana-appindicator3-dev \
            libgtk-3-dev \
            libssl-dev \
            librsvg2-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            patchelf \
            pkg-config \
            rpm \
            wget

      - name: Build whisper.cpp CLI
        run: |
          cmake -S external/whisper.cpp -B external/whisper.cpp/build-linux \
            -DCMAKE_BUILD_TYPE=Release \
            -DGGML_NATIVE=OFF
          cmake --build external/whisper.cpp/build-linux --config Release --target whisper-cli --parallel

      - name: Build Fun-ASR CLI
        run: |
          cmake -S external/Fun-ASR/runtime/llama.cpp -B external/Fun-ASR/runtime/llama.cpp/build \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build external/Fun-ASR/runtime/llama.cpp/build --config Release --target llama-funasr-cli --parallel
          test -f external/Fun-ASR/runtime/llama.cpp/build/bin/llama-funasr-cli

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build frontend
        run: npm run build

      - name: Resolve component release tag
        id: component-tag
        run: |
          if echo "$GITHUB_REF_NAME" | grep -q '^v'; then
            tag="$GITHUB_REF_NAME"
          elif [ -n "${{ inputs.release_tag }}" ]; then
            tag="${{ inputs.release_tag }}"
          else
            version="$(node -p "require('./package.json').version")"
            tag="v$version"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "Component release tag: $tag"

      - name: Build Linux packages
        env:
          AUDRAFLOW_GITHUB_TOKEN: ${{ secrets.AUDRAFLOW_RELEASE_READ_TOKEN }}
          AUDRAFLOW_COMPONENT_RELEASE_TAG: ${{ steps.component-tag.outputs.tag }}
          AUDRAFLOW_COMPONENT_BASE_URL: ${{ format('https://github.com/{0}/releases/download/{1}', github.repository, steps.component-tag.outputs.tag) }}
        run: npm run desktop:build:linux

      - name: Package runtime components
        run: |
          version="$(node -p "require('./package.json').version")"
          mkdir -p release
          python3 - <<PY
          import zipfile
          from pathlib import Path

          version = "${version}"
          source = Path("external/Fun-ASR/runtime/llama.cpp/build/bin/llama-funasr-cli")
          if not source.is_file():
              raise SystemExit(f"Missing Fun-ASR runtime component: {source}")
          archive = Path(f"release/AudraFlow_{version}_linux_funasr-runtime.zip")
          with zipfile.ZipFile(archive, "w", compression=zipfile.ZIP_DEFLATED) as zf:
              zf.write(source, "llama-funasr-cli")
          PY

      - name: Generate release manifest
        run: npm run release:manifest -- --require-linux --artifact-set linux

      - name: Verify release manifest
        run: npm run release:manifest:verify -- --require-linux --artifact-set linux

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: AudraFlow-linux
          if-no-files-found: error
          path: |
            target/release/bundle/deb/*.deb
            target/release/bundle/rpm/*.rpm
            target/release/bundle/appimage/*.AppImage
            release/*.zip
            release/AudraFlow_*_linux_manifest.json
            release/SHA256SUMS.linux

      - name: Resolve release publishing
        id: release
        env:
          IS_TAG: ${{ startsWith(github.ref, 'refs/tags/') }}
          REF_NAME: ${{ github.ref_name }}
          PUBLISH_RELEASE: ${{ inputs.publish_release || 'false' }}
          RELEASE_TAG_INPUT: ${{ inputs.release_tag }}
        run: |
          is_tag="$(echo "$IS_TAG" | tr '[:upper:]' '[:lower:]')"
          manual_publish="$(echo "$PUBLISH_RELEASE" | tr '[:upper:]' '[:lower:]')"
          release_tag="$RELEASE_TAG_INPUT"

          if [[ "$is_tag" == "true" ]]; then
            release_tag="$REF_NAME"
          fi

          if [[ "$manual_publish" == "true" && -z "$release_tag" ]]; then
            release_tag="v$(node -p "require('./package.json').version")"
          fi

          publish=false
          if [[ "$is_tag" == "true" || "$manual_publish" == "true" ]]; then
            publish=true
          fi

          echo "publish=$publish" >> "$GITHUB_OUTPUT"
          echo "tag=$release_tag" >> "$GITHUB_OUTPUT"

      - name: Upload assets to GitHub Release
        if: steps.release.outputs.publish == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: |
          mapfile -t assets < <(
            find target/release/bundle -type f \( \
              -name '*.deb' -o \
              -name '*.rpm' -o \
              -name '*.AppImage' \
            \) -print
            find release -type f \( \
              -name '*.zip' -o \
              -name 'AudraFlow_*_linux_manifest.json' -o \
              -name 'SHA256SUMS.linux' \
            \) -print
          )

          if [[ "${#assets[@]}" -eq 0 ]]; then
            echo "No release assets were found." >&2
            exit 1
          fi

          if ! gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release create "$RELEASE_TAG" --title "AudraFlow $RELEASE_TAG" --notes "Automated Linux release build." \
              || gh release view "$RELEASE_TAG" >/dev/null
          fi

          gh release upload "$RELEASE_TAG" "${assets[@]}" --clobber
