name: Windows Release

on:
  workflow_dispatch:
    inputs:
      publish_release:
        description: "Upload the Windows artifacts to a GitHub Release"
        required: false
        default: false
        type: boolean
      release_tag:
        description: "Release tag to create/update when publishing manually; defaults to package.json version, for example v1.0.0"
        required: false
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows installers
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20.19.5"
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup MSVC environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Install frontend dependencies
        run: npm ci

      - name: Prepare FFmpeg tools
        shell: pwsh
        run: |
          choco install ffmpeg -y
          New-Item -ItemType Directory -Force release\windows-portable\AudraFlow\bin | Out-Null
          Copy-Item (Get-Command ffmpeg.exe).Source release\windows-portable\AudraFlow\bin\ffmpeg.exe -Force
          Copy-Item (Get-Command ffprobe.exe).Source release\windows-portable\AudraFlow\bin\ffprobe.exe -Force

      - name: Build whisper.cpp CLI
        shell: pwsh
        run: |
          cmake -S external\whisper.cpp -B external\whisper.cpp\build -DCMAKE_BUILD_TYPE=Release -DGGML_NATIVE=OFF
          cmake --build external\whisper.cpp\build --config Release --target whisper-cli --parallel

          $releaseCli = "external\whisper.cpp\build\bin\Release\whisper-cli.exe"
          $flatCli = "external\whisper.cpp\build\bin\whisper-cli.exe"
          if (Test-Path $releaseCli) {
            Copy-Item $releaseCli $flatCli -Force
          }

          if (-not (Test-Path $flatCli)) {
            throw "whisper-cli.exe was not produced at $flatCli"
          }

      - name: Package runtime components
        shell: pwsh
        run: |
          $version = (Get-Content -Raw package.json | ConvertFrom-Json).version
          $tempRoot = Join-Path $env:RUNNER_TEMP "audraflow-runtime-components"
          Remove-Item -LiteralPath $tempRoot -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force release | Out-Null

          $whisperDir = Join-Path $tempRoot "whisper\bin"
          New-Item -ItemType Directory -Force $whisperDir | Out-Null
          $whisperSearchRoots = @(
            "external\whisper.cpp\build\bin\Release",
            "external\whisper.cpp\build\bin",
            "external\whisper.cpp\build"
          )
          foreach ($name in @("whisper-cli.exe", "whisper.dll", "ggml.dll", "ggml-base.dll", "ggml-cpu.dll")) {
            $match = $null
            foreach ($root in $whisperSearchRoots) {
              if (Test-Path -LiteralPath $root) {
                $match = Get-ChildItem -LiteralPath $root -Recurse -Filter $name -File -ErrorAction SilentlyContinue | Select-Object -First 1
                if ($match) { break }
              }
            }
            if (-not $match) {
              throw "Missing whisper runtime component: $name"
            }
            Copy-Item -LiteralPath $match.FullName -Destination (Join-Path $whisperDir $name) -Force
          }
          Compress-Archive -Path (Join-Path $whisperDir "*") -DestinationPath "release\AudraFlow_${version}_windows_whisper-runtime.zip" -Force

          $ffmpegDir = Join-Path $tempRoot "ffmpeg\bin"
          New-Item -ItemType Directory -Force $ffmpegDir | Out-Null
          foreach ($name in @("ffmpeg.exe", "ffprobe.exe")) {
            $source = Join-Path "release\windows-portable\AudraFlow\bin" $name
            if (-not (Test-Path -LiteralPath $source -PathType Leaf)) {
              throw "Missing FFmpeg runtime component: $source"
            }
            Copy-Item -LiteralPath $source -Destination (Join-Path $ffmpegDir $name) -Force
          }
          Compress-Archive -Path (Join-Path $ffmpegDir "*") -DestinationPath "release\AudraFlow_${version}_windows_ffmpeg-runtime.zip" -Force

      - name: Lint
        run: npm run lint

      - name: Build frontend
        run: npm run build

      - name: Prepare runtime assets
        run: npm run prepare:runtime-assets

      - name: Stage sidecars
        run: npm run stage:sidecars

      - name: Build Windows installers
        env:
          AUDRAFLOW_SKIP_BEFORE_BUILD: "1"
        run: npm run desktop:build:windows

      - name: Generate release manifest
        run: npm run release:manifest -- --require-windows --artifact-set windows

      - name: Verify release manifest
        run: npm run release:manifest:verify -- --require-windows --artifact-set windows

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: AudraFlow-windows
          if-no-files-found: error
          path: |
            target/release/bundle/nsis/*.exe
            target/release/bundle/msi/*.msi
            release/*.zip
            release/AudraFlow_*_windows_manifest.json
            release/SHA256SUMS.windows

      - name: Resolve release publishing
        id: release
        shell: pwsh
        env:
          IS_TAG: ${{ startsWith(github.ref, 'refs/tags/') }}
          REF_NAME: ${{ github.ref_name }}
          PUBLISH_RELEASE: ${{ inputs.publish_release || 'false' }}
          RELEASE_TAG_INPUT: ${{ inputs.release_tag }}
        run: |
          $isTag = $env:IS_TAG.ToLowerInvariant() -eq "true"
          $manualPublish = $env:PUBLISH_RELEASE.ToLowerInvariant() -eq "true"
          $releaseTag = $env:RELEASE_TAG_INPUT

          if ($isTag) {
            $releaseTag = $env:REF_NAME
          }

          if ($manualPublish -and [string]::IsNullOrWhiteSpace($releaseTag)) {
            $packageVersion = (Get-Content -Raw package.json | ConvertFrom-Json).version
            $releaseTag = "v$packageVersion"
          }

          $publish = $isTag -or $manualPublish
          "publish=$($publish.ToString().ToLowerInvariant())" >> $env:GITHUB_OUTPUT
          "tag=$releaseTag" >> $env:GITHUB_OUTPUT

      - name: Upload assets to GitHub Release
        if: steps.release.outputs.publish == 'true'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: |
          $assets = @()
          $assets += Get-ChildItem -LiteralPath "target\release\bundle\nsis" -Filter "*.exe" -File -ErrorAction SilentlyContinue
          $assets += Get-ChildItem -LiteralPath "target\release\bundle\msi" -Filter "*.msi" -File -ErrorAction SilentlyContinue
          $assets += Get-ChildItem -LiteralPath "release" -Filter "*.zip" -File -ErrorAction SilentlyContinue
          $assets += Get-ChildItem -LiteralPath "release" -Filter "AudraFlow_*_windows_manifest.json" -File -ErrorAction SilentlyContinue
          $assets += Get-Item -LiteralPath "release\SHA256SUMS.windows" -ErrorAction SilentlyContinue

          if (-not $assets -or $assets.Count -eq 0) {
            throw "No release assets were found."
          }

          gh release view $env:RELEASE_TAG *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create $env:RELEASE_TAG --title "AudraFlow $env:RELEASE_TAG" --notes "Automated Windows release build."
            if ($LASTEXITCODE -ne 0) {
              gh release view $env:RELEASE_TAG *> $null
              if ($LASTEXITCODE -ne 0) {
                throw "Could not create or find release $env:RELEASE_TAG"
              }
            }
          }

          $assetPaths = $assets | ForEach-Object { $_.FullName }
          gh release upload $env:RELEASE_TAG @assetPaths --clobber
