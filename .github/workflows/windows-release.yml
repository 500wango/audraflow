name: Windows Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build-windows:
    name: Build Windows installers
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20.19.5"
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Install frontend dependencies
        run: npm ci

      - name: Prepare FFmpeg tools
        shell: pwsh
        run: |
          choco install ffmpeg -y
          New-Item -ItemType Directory -Force release\windows-portable\AudraFlow\bin | Out-Null
          Copy-Item (Get-Command ffmpeg.exe).Source release\windows-portable\AudraFlow\bin\ffmpeg.exe -Force
          Copy-Item (Get-Command ffprobe.exe).Source release\windows-portable\AudraFlow\bin\ffprobe.exe -Force

      - name: Build whisper.cpp CLI
        shell: pwsh
        run: |
          cmake -S external\whisper.cpp -B external\whisper.cpp\build -DCMAKE_BUILD_TYPE=Release -DGGML_NATIVE=OFF
          cmake --build external\whisper.cpp\build --config Release --target whisper-cli --parallel

          $releaseCli = "external\whisper.cpp\build\bin\Release\whisper-cli.exe"
          $flatCli = "external\whisper.cpp\build\bin\whisper-cli.exe"
          if (Test-Path $releaseCli) {
            Copy-Item $releaseCli $flatCli -Force
          }

          if (-not (Test-Path $flatCli)) {
            throw "whisper-cli.exe was not produced at $flatCli"
          }

      - name: Lint
        run: npm run lint

      - name: Build frontend
        run: npm run build

      - name: Build Windows installers
        run: npm run desktop:build:windows

      - name: Generate release manifest
        run: npm run release:manifest -- --require-windows

      - name: Verify release manifest
        run: npm run release:manifest:verify -- --require-windows

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: AudraFlow-windows
          if-no-files-found: error
          path: |
            target/release/bundle/nsis/*.exe
            target/release/bundle/msi/*.msi
            release/AudraFlow_*_manifest.json
            release/SHA256SUMS
